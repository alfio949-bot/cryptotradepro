<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CryptoTrade Pro — Accesso</title>
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    * { font-family: 'Inter', sans-serif; box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0e1a; color: white; min-height: 100vh; }
    #root { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    input, select { background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; padding: 10px 12px; margin: 8px 0; font-size: 14px; width: 100%; }
    input:focus, select:focus { outline: none; border-color: #6366f1; }
    button { cursor: pointer; font-family: 'Inter', sans-serif; }
    .container { background: rgba(255,255,255,0.04); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 30px; width: 100%; max-width: 400px; }
    .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: 600; margin-top: 12px; }
    .btn-primary { background: linear-gradient(135deg, #6366f1, #a855f7); color: white; }
    .btn-secondary { background: transparent; color: #9ca3af; }
    .title { font-size: 28px; font-weight: 800; background: linear-gradient(135deg, #6366f1, #a855f7, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
    .subtitle { font-size: 14px; color: #9ca3af; margin-bottom: 24px; }
    .error { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.2); color: #f87171; padding: 10px 12px; border-radius: 8px; font-size: 12px; margin: 10px 0; }
    .flex { display: flex; gap: 12px; }
    label { font-size: 12px; color: #9ca3af; display: block; margin-top: 12px; margin-bottom: 4px; }
  </style>
</head>
<body>
<div id="root"></div>
<script>
const { useState } = React;

const DASHBOARD_URL = "crypto_dashboard_v3_fixed.html";
const store = {
  get: (k, d = null) => {
    try { return JSON.parse(localStorage.getItem(k) || "null") ?? d; } catch { return d; }
  },
  set: (k, v) => localStorage.setItem(k, JSON.stringify(v))
};

async function sha256(msg) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function callAuth(action, params = {}) {
  const USERS_KEY = 'ct_users';
  const SESSION_KEY = 'ct_session';
  const users = store.get(USERS_KEY, []);
  
  if (action === 'register') {
    const { email, password, full_name } = params;
    if (!email || !password) return { success: false, error: 'Dati mancanti.' };
    
    const emailNorm = (email || '').toLowerCase().trim();
    if (users.find(u => u.email === emailNorm)) return { success: false, error: 'Email già registrata.' };
    
    const passwordHash = await sha256(password + emailNorm);
    const newUser = {
      id: 'u_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7),
      email: emailNorm,
      full_name: full_name || '',
      passwordHash,
      createdAt: new Date().toISOString()
    };
    users.push(newUser);
    store.set(USERS_KEY, users);
    return { success: true, user: newUser };
  }
  
  if (action === 'login') {
    const { email, password } = params;
    const emailNorm = (email || '').toLowerCase().trim();
    const user = users.find(u => u.email === emailNorm);
    if (!user) return { success: false, error: 'Credenziali non valide.' };
    
    const hash = await sha256(password + emailNorm);
    if (hash !== user.passwordHash) return { success: false, error: 'Credenziali non valide.' };
    
    const token = await sha256('tok_' + user.id + '_' + Date.now());
    const session = {
      token,
      userId: user.id,
      expires: Date.now() + 86400000 * 7,
      user: { id: user.id, email: user.email, full_name: user.full_name }
    };
    store.set(SESSION_KEY, session);
    return { success: true, ...session };
  }
  
  return { success: false, error: 'Azione non riconosciuta.' };
}

const EXCHANGES = ["Binance", "Kraken", "KuCoin", "Bybit", "OKX", "Coinbase"];
const COUNTRIES = ["Italia", "Germania", "Francia", "Spagna", "USA", "UK", "Canada", "Australia"];

function LoginForm({ onSwitch, onSuccess }) {
  const [form, setForm] = useState({ email: "", password: "" });
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState("");
  
  const doLogin = async e => {
    e.preventDefault();
    setLoading(true);
    setErr("");
    try {
      const res = await callAuth("login", form);
      if (res.success) {
        store.set("crypto_session", { token: res.token, userId: res.userId, user: res.user });
        localStorage.setItem('user_logged_in', '1');
        onSuccess(res.user);
      } else {
        setErr(res.error || "Errore");
      }
    } catch (e) {
      setErr("Errore di rete");
    }
    setLoading(false);
  };
  
  return React.createElement("div", null,
    React.createElement("h1", { className: "title" }, "Accedi"),
    React.createElement("p", { className: "subtitle" }, "Bentornato su CryptoTrade Pro"),
    err && React.createElement("div", { className: "error" }, err),
    React.createElement("form", { onSubmit: doLogin },
      React.createElement("label", null, "Email"),
      React.createElement("input", { type: "email", placeholder: "tua@email.it", value: form.email, onChange: e => setForm({ ...form, email: e.target.value }), disabled: loading }),
      React.createElement("label", null, "Password"),
      React.createElement("input", { type: "password", placeholder: "••••••••", value: form.password, onChange: e => setForm({ ...form, password: e.target.value }), disabled: loading }),
      React.createElement("button", { type: "submit", className: "btn btn-primary", disabled: loading }, loading ? "Caricamento..." : "Accedi")
    ),
    React.createElement("div", { style: { textAlign: 'center', marginTop: '16px', fontSize: '12px' } },
      React.createElement("button", { type: "button", className: "btn-secondary", onClick: () => onSwitch("register"), style: { background: 'none', border: 'none', color: '#a78bfa', cursor: 'pointer' } }, "Non hai un account? Registrati")
    )
  );
}

function RegisterForm({ onSwitch }) {
  const [form, setForm] = useState({ full_name: "", email: "", password: "", confirmPwd: "" });
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState("");
  const [done, setDone] = useState(false);
  
  const doRegister = async e => {
    e.preventDefault();
    if (form.password !== form.confirmPwd) { setErr("Le password non coincidono"); return; }
    if (form.password.length < 8) { setErr("Password minimo 8 caratteri"); return; }
    
    setLoading(true);
    setErr("");
    try {
      const res = await callAuth("register", form);
      if (res.success) {
        try {
          const loginRes = await callAuth("login", { email: form.email, password: form.password });
          if (loginRes.success) {
            store.set("crypto_session", { token: loginRes.token, userId: loginRes.userId, user: loginRes.user });
            localStorage.setItem('user_logged_in', '1');
            window.location.href = DASHBOARD_URL;
            return;
          }
        } catch (e) {}
        setDone(true);
      } else {
        setErr(res.error || "Errore");
      }
    } catch (e) {
      setErr("Errore di rete");
    }
    setLoading(false);
  };
  
  if (done) return React.createElement("div", { style: { textAlign: 'center' } },
    React.createElement("div", { style: { fontSize: '48px', marginBottom: '16px' } }, "✅"),
    React.createElement("h2", { style: { color: '#22c55e', marginBottom: '12px' } }, "Registrazione completata!"),
    React.createElement("p", { style: { color: '#9ca3af', fontSize: '14px', marginBottom: '16px' } }, "Account creato con successo!"),
    React.createElement("button", { className: "btn btn-primary", onClick: () => onSwitch("login") }, "Accedi")
  );
  
  return React.createElement("div", null,
    React.createElement("h1", { className: "title" }, "Registrati"),
    React.createElement("p", { className: "subtitle" }, "Crea il tuo account"),
    err && React.createElement("div", { className: "error" }, err),
    React.createElement("form", { onSubmit: doRegister },
      React.createElement("label", null, "Nome completo"),
      React.createElement("input", { type: "text", placeholder: "Mario Rossi", value: form.full_name, onChange: e => setForm({ ...form, full_name: e.target.value }), disabled: loading }),
      React.createElement("label", null, "Email"),
      React.createElement("input", { type: "email", placeholder: "tua@email.it", value: form.email, onChange: e => setForm({ ...form, email: e.target.value }), disabled: loading }),
      React.createElement("label", null, "Password (min 8 caratteri)"),
      React.createElement("input", { type: "password", placeholder: "••••••••", value: form.password, onChange: e => setForm({ ...form, password: e.target.value }), disabled: loading }),
      React.createElement("label", null, "Conferma password"),
      React.createElement("input", { type: "password", placeholder: "••••••••", value: form.confirmPwd, onChange: e => setForm({ ...form, confirmPwd: e.target.value }), disabled: loading }),
      React.createElement("button", { type: "submit", className: "btn btn-primary", disabled: loading }, loading ? "Caricamento..." : "Registrati")
    ),
    React.createElement("div", { style: { textAlign: 'center', marginTop: '16px', fontSize: '12px' } },
      React.createElement("button", { type: "button", className: "btn-secondary", onClick: () => onSwitch("login"), style: { background: 'none', border: 'none', color: '#a78bfa', cursor: 'pointer' } }, "Hai già un account? Accedi")
    )
  );
}

function App() {
  const [page, setPage] = useState('register');
  
  return React.createElement("div", { className: "container" },
    page === "register" && React.createElement(RegisterForm, { onSwitch: setPage }),
    page === "login" && React.createElement(LoginForm, { onSwitch: setPage, onSuccess: () => window.location.href = DASHBOARD_URL })
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App, null));
</script>
</body>
</html>
