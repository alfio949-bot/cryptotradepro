<body>
<div id="root"></div>
<script>
const { useState, useEffect } = React;

const DASHBOARD_URL = "dashboard.html";
const store = {
  get: (k, d = null) => {
    try { return JSON.parse(localStorage.getItem(k) || "null") ?? d; } catch { return d; }
  },
  set: (k, v) => localStorage.setItem(k, JSON.stringify(v))
};

// ── EmailJS Config ──────────────────────────────────────────────────────
// ISTRUZIONI SETUP (da fare una volta sola su emailjs.com):
// 1. Registrati su https://www.emailjs.com (piano gratuito: 200 email/mese)
// 2. Crea un "Email Service" (es. Gmail) → ottieni SERVICE_ID
// 3. Crea un "Email Template" con variabili: {{to_name}}, {{to_email}}, {{passkey}}, {{platform_name}}
// 4. Ottieni PUBLIC_KEY dal tuo profilo
// ── Fine istruzioni ─────────────────────────────────────────────────────
const EMAILJS_SERVICE_ID  = 'YOUR_SERVICE_ID';   // es. 'service_abc123'
const EMAILJS_TEMPLATE_ID = 'YOUR_TEMPLATE_ID';  // es. 'template_xyz789'
const EMAILJS_PUBLIC_KEY  = 'YOUR_PUBLIC_KEY';   // es. 'aBcDeFgHiJkLm'

async function sha256(msg) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// ── Genera passkey univoca CTP-XXXX-XXXX ────────────────────────────────
function generatePasskey() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; // no I,O,0,1 per chiarezza
  const seg = () => Array.from({length:4}, () => chars[Math.floor(Math.random()*chars.length)]).join('');
  return `CTP-${seg()}-${seg()}`;
}

// ── Invia email con EmailJS ──────────────────────────────────────────────
async function sendPasskeyEmail(toEmail, toName, passkey) {
  // Se EmailJS non è configurato, salta silenziosamente (mostriamo la passkey a schermo)
  if (EMAILJS_PUBLIC_KEY === 'YOUR_PUBLIC_KEY') {
    console.warn('EmailJS non configurato — passkey mostrata solo a schermo');
    return { ok: false, reason: 'not_configured' };
  }
  try {
    emailjs.init(EMAILJS_PUBLIC_KEY);
    const res = await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
      to_name:       toName || toEmail.split('@')[0],
      to_email:      toEmail,
      passkey:       passkey,
      platform_name: 'CryptoTrade Pro | Institutional Terminal'
    });
    return { ok: true, res };
  } catch(e) {
    console.error('EmailJS error:', e);
    return { ok: false, reason: e.text || e.message || 'unknown' };
  }
}

// ── Auth (localStorage) ──────────────────────────────────────────────────
async function callAuth(action, params = {}) {
  const USERS_KEY = 'ct_users';
  const users = store.get(USERS_KEY, []);

  if (action === 'register') {
    const { email, password, full_name, passkey } = params;
    if (!email || !password) return { success: false, error: 'Dati mancanti.' };
    const emailNorm = (email || '').toLowerCase().trim();
    if (users.find(u => u.email === emailNorm)) return { success: false, error: 'Email già registrata.' };
    const passwordHash = await sha256(password + emailNorm);
    const passkeyHash  = await sha256(passkey + emailNorm); // salva hash, mai plaintext
    const newUser = {
      id: 'u_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7),
      email: emailNorm,
      full_name: full_name || '',
      passwordHash,
      passkeyHash,   // <-- salvata come hash
      createdAt: new Date().toISOString()
    };
    users.push(newUser);
    store.set(USERS_KEY, users);
    return { success: true, user: newUser };
  }

  if (action === 'login') {
    const { email, password } = params;
    const emailNorm = (email || '').toLowerCase().trim();
    const user = users.find(u => u.email === emailNorm);
    if (!user) return { success: false, error: 'Credenziali non valide.' };
    const hash = await sha256(password + emailNorm);
    if (hash !== user.passwordHash) return { success: false, error: 'Credenziali non valide.' };
    const token = await sha256('tok_' + user.id + '_' + Date.now());
    const session = { token, userId: user.id, expires: Date.now() + 86400000 * 7,
      user: { id: user.id, email: user.email, full_name: user.full_name } };
    store.set('ct_session', session);
    return { success: true, ...session };
  }

  return { success: false, error: 'Azione non riconosciuta.' };
}

// ── Componente LoginForm ─────────────────────────────────────────────────
function LoginForm({ onSwitch, onSuccess }) {
  const [form, setForm] = useState({ email: "", password: "" });
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState("");

  const doLogin = async e => {
    e.preventDefault();
    setLoading(true); setErr("");
    try {
      const res = await callAuth("login", form);
      if (res.success) {
        store.set("crypto_session", { token: res.token, userId: res.userId, user: res.user });
        localStorage.setItem('user_logged_in', '1');
        onSuccess(res.user);
      } else { setErr(res.error || "Errore"); }
    } catch { setErr("Errore di rete"); }
    setLoading(false);
  };

  return React.createElement("div", null,
    React.createElement("h1", { className: "title" }, "Accedi"),
    React.createElement("p", { className: "subtitle" }, "Bentornato su CryptoTrade Pro"),
    err && React.createElement("div", { className: "error" }, err),
    React.createElement("form", { onSubmit: doLogin },
      React.createElement("label", null, "Email"),
      React.createElement("input", { type: "email", placeholder: "tua@email.it", value: form.email,
        onChange: e => setForm({ ...form, email: e.target.value }), disabled: loading }),
      React.createElement("label", null, "Password"),
      React.createElement("input", { type: "password", placeholder: "••••••••", value: form.password,
        onChange: e => setForm({ ...form, password: e.target.value }), disabled: loading }),
      React.createElement("button", { type: "submit", className: "btn btn-primary", disabled: loading },
        loading ? "⏳ Accesso in corso…" : "🔐 Accedi")
    ),
    React.createElement("div", { style: { textAlign: 'center', marginTop: '16px', fontSize: '12px' } },
      React.createElement("button", { type: "button", className: "btn-secondary",
        onClick: () => onSwitch("register"),
        style: { background: 'none', border: 'none', color: '#a78bfa', cursor: 'pointer' }
      }, "Non hai un account? Registrati")
    )
  );
}

// ── Componente RegisterForm ──────────────────────────────────────────────
function RegisterForm({ onSwitch }) {
  const [form, setForm]         = useState({ full_name: "", email: "", password: "", confirmPwd: "" });
  const [loading, setLoading]   = useState(false);
  const [err, setErr]           = useState("");
  const [passkey, setPasskey]   = useState(null);   // dopo registrazione
  const [emailSent, setEmailSent] = useState(null); // true/false/null
  const [copied, setCopied]     = useState(false);
  const [tosAccepted, setTosAccepted] = useState(false);
  const [showTos, setShowTos]   = useState(false);

  const doRegister = async e => {
    e.preventDefault();
    if (!tosAccepted)           { setErr("Devi accettare i Termini e le Condizioni per procedere."); return; }
    if (form.password !== form.confirmPwd) { setErr("Le password non coincidono."); return; }
    if (form.password.length < 8) { setErr("Password minimo 8 caratteri."); return; }
    if (!form.email.includes('@')) { setErr("Inserisci un indirizzo email valido."); return; }

    setLoading(true); setErr("");

    // 1. Genera passkey univoca
    const newPasskey = generatePasskey();

    // 2. Registra utente
    try {
      const res = await callAuth("register", { ...form, passkey: newPasskey });
      if (!res.success) { setErr(res.error || "Errore"); setLoading(false); return; }

      // 3. Aggiorna l'AG_KEY in localStorage per questa sessione
      //    (la passkey viene salvata anche in sessionStorage per sbloccare la dashboard)
      sessionStorage.setItem('ag_unlocked', '1');
      sessionStorage.setItem('user_passkey', newPasskey); // per mostrare nell'area utente
      localStorage.setItem('user_passkey_' + res.user.id, newPasskey); // backup locale

      // 4. Invia email
      setPasskey(newPasskey);
      const emailRes = await sendPasskeyEmail(form.email, form.full_name, newPasskey);
      setEmailSent(emailRes.ok);

      // 5. Auto-login
      try {
        const loginRes = await callAuth("login", { email: form.email, password: form.password });
        if (loginRes.success) {
          store.set("crypto_session", { token: loginRes.token, userId: loginRes.userId, user: loginRes.user });
          localStorage.setItem('user_logged_in', '1');
          localStorage.setItem('user_name', form.full_name || form.email);
        }
      } catch {}

    } catch { setErr("Errore di rete. Riprova."); }
    setLoading(false);
  };

  const copyPasskey = () => {
    if (!passkey) return;
    navigator.clipboard.writeText(passkey).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2500);
    }).catch(() => {
      // fallback
      const el = document.createElement('textarea');
      el.value = passkey;
      document.body.appendChild(el);
      el.select();
      document.execCommand('copy');
      document.body.removeChild(el);
      setCopied(true);
      setTimeout(() => setCopied(false), 2500);
    });
  };

  // ── Schermata DOPO registrazione: mostra passkey ──────────────────────
  if (passkey) {
    return React.createElement("div", null,
      React.createElement("div", { style: { textAlign: 'center', marginBottom: '20px' } },
        React.createElement("div", { style: { fontSize: '52px', marginBottom: '8px' } }, "🎉"),
        React.createElement("h2", { style: { fontSize: '22px', fontWeight: 800,
          background: 'linear-gradient(135deg,#22c55e,#06b6d4)', WebkitBackgroundClip:'text',
          WebkitTextFillColor:'transparent' } }, "Registrazione completata!"),
        React.createElement("p", { style: { color: '#9ca3af', fontSize: '13px', marginTop: '6px' } },
          "Ecco la tua Passkey personale di accesso")
      ),

      // Passkey box
      React.createElement("div", { className: "passkey-box" },
        React.createElement("div", { style: { fontSize: '12px', color: '#9ca3af', marginBottom: '4px' } },
          "🔑 LA TUA PASSKEY PERSONALE"),
        React.createElement("div", {
          className: "passkey-code",
          onClick: copyPasskey,
          title: "Clicca per copiare"
        }, passkey),
        React.createElement("div", { className: "copy-hint" },
          copied
            ? React.createElement("span", { style: { color: '#22c55e' } }, "✅ Copiata!")
            : "👆 Clicca per copiare"
        )
      ),

      // Stato email
      emailSent === true && React.createElement("div", { className: "success-box" },
        "📧 Passkey inviata a " + form.email + " — controlla la tua casella (anche spam)."
      ),
      emailSent === false && React.createElement("div", { className: "warning-box" },
        "⚠️ Email non inviata (servizio non configurato). " +
        "Salva subito la passkey qui sopra — ti servirà per ogni accesso alla dashboard."
      ),
      emailSent === null && React.createElement("div", { style: { color: '#9ca3af', fontSize: '12px', textAlign: 'center' } },
        "📤 Invio email in corso…"
      ),

      // Warning salvataggio
      React.createElement("div", { className: "warning-box" },
        "⚠️ IMPORTANTE: Salva questa passkey in un posto sicuro. " +
        "Viene richiesta ogni volta che apri la dashboard su un nuovo browser o dispositivo."
      ),

      // CTA entra
      React.createElement("button", {
        className: "btn btn-primary",
        style: { marginTop: '8px' },
        onClick: () => { window.location.href = DASHBOARD_URL; }
      }, "🚀 Entra nella Dashboard"),

      React.createElement("div", { style: { textAlign: 'center', marginTop: '12px', fontSize: '11px', color: '#4b5563' } },
        "La sessione è già attiva — la passkey non verrà richiesta ora"
      )
    );
  }

  // ── Schermata REGISTRAZIONE ───────────────────────────────────────────
  return React.createElement("div", null,
    React.createElement("h1", { className: "title" }, "Registrati"),
    React.createElement("p", { className: "subtitle" }, "Crea il tuo account · Ricevi la tua Passkey"),
    err && React.createElement("div", { className: "error" }, err),
    React.createElement("form", { onSubmit: doRegister },
      React.createElement("label", null, "Nome completo"),
      React.createElement("input", { type: "text", placeholder: "Mario Rossi", value: form.full_name,
        onChange: e => setForm({ ...form, full_name: e.target.value }), disabled: loading }),
      React.createElement("label", null, "Email"),
      React.createElement("input", { type: "email", placeholder: "tua@email.it", value: form.email,
        onChange: e => setForm({ ...form, email: e.target.value }), disabled: loading }),
      React.createElement("label", null, "Password (min 8 caratteri)"),
      React.createElement("input", { type: "password", placeholder: "••••••••", value: form.password,
        onChange: e => setForm({ ...form, password: e.target.value }), disabled: loading }),
      React.createElement("label", null, "Conferma password"),
      React.createElement("input", { type: "password", placeholder: "••••••••", value: form.confirmPwd,
        onChange: e => setForm({ ...form, confirmPwd: e.target.value }), disabled: loading }),

      // TOS
      React.createElement("div", { style: {display:'flex',alignItems:'flex-start',gap:'10px',margin:'12px 0',
        padding:'10px',background:'rgba(99,102,241,0.05)',borderRadius:'8px',border:'1px solid rgba(99,102,241,0.15)'} },
        React.createElement("input", { type:"checkbox", id:"tos-check", checked: tosAccepted,
          onChange: e => setTosAccepted(e.target.checked),
          style: {width:'16px',height:'16px',marginTop:'2px',flexShrink:0,cursor:'pointer'} }),
        React.createElement("label", { htmlFor:"tos-check",
          style: {fontSize:'12px',color:'#9ca3af',cursor:'pointer',lineHeight:'1.5',margin:0} },
          "Ho letto e accetto i ",
          React.createElement("span", {
            onClick: e => { e.preventDefault(); setShowTos(true); },
            style: {color:'#6366f1',textDecoration:'underline',cursor:'pointer'}
          }, "Termini e Condizioni"),
          " di utilizzo della piattaforma."
        )
      ),

      // Nota passkey
      React.createElement("div", { style: {display:'flex',gap:'10px',padding:'10px',
        background:'rgba(99,102,241,0.08)',borderRadius:'8px',border:'1px solid rgba(99,102,241,0.2)',
        marginBottom:'8px',alignItems:'flex-start'} },
        React.createElement("span", { style: {fontSize:'18px',flexShrink:0} }, "🔑"),
        React.createElement("div", { style: {fontSize:'12px',color:'#9ca3af',lineHeight:1.5} },
          React.createElement("strong", { style: {color:'#a78bfa'} }, "Passkey personale: "),
          "dopo la registrazione riceverai una passkey univoca via email. Serve per sbloccare la dashboard."
        )
      ),

      React.createElement("button", { type: "submit", className: "btn btn-primary",
        disabled: loading || !tosAccepted },
        loading ? "⏳ Creazione account…" : "✅ Registrati e ricevi Passkey"
      ),

      // TOS Modal
      showTos && React.createElement("div", {
        style: {position:'fixed',inset:0,background:'rgba(0,0,0,.85)',zIndex:9999,overflowY:'auto',
          display:'flex',alignItems:'flex-start',justifyContent:'center',padding:'40px 16px'}
      },
        React.createElement("div", {
          style: {background:'#111827',borderRadius:'12px',padding:'24px',maxWidth:'500px',width:'100%',
            border:'1px solid rgba(255,255,255,.1)'}
        },
          React.createElement("h3", { style: {color:'#e2e8f0',marginBottom:'16px'} }, "📋 Termini e Condizioni"),
          React.createElement("div", { style: {fontSize:'12px',color:'#9ca3af',lineHeight:1.7,maxHeight:'60vh',overflowY:'auto'} },
            React.createElement("p", { style: {fontWeight:'700',color:'#e2e8f0'} }, "1. Servizio"),
            React.createElement("p", null, "CryptoTrade Pro è una piattaforma di paper trading a scopo educativo e simulativo. Nessuna transazione reale viene eseguita."),
            React.createElement("p", { style: {marginTop:'12px',fontWeight:'700',color:'#e2e8f0'} }, "2. Responsabilità"),
            React.createElement("p", null, "L'utente è l'unico responsabile delle proprie decisioni di investimento. La piattaforma non fornisce consulenza finanziaria."),
            React.createElement("p", { style: {marginTop:'12px',fontWeight:'700',color:'#e2e8f0'} }, "3. Dati"),
            React.createElement("p", null, "I dati di trading sono simulati. I prezzi in tempo reale sono forniti da fonti pubbliche senza garanzia di accuratezza."),
            React.createElement("p", { style: {marginTop:'12px',fontWeight:'700',color:'#e2e8f0'} }, "4. Privacy"),
            React.createElement("p", null, "I dati vengono archiviati esclusivamente nel tuo browser (localStorage). Nessuna trasmissione a server terzi senza consenso."),
            React.createElement("p", { style: {marginTop:'12px',fontWeight:'700',color:'#e2e8f0'} }, "5. Accettazione"),
            React.createElement("p", null, "Utilizzando la piattaforma dichiari di avere almeno 18 anni e di accettare integralmente i presenti Termini.")
          ),
          React.createElement("button", {
            className: "btn btn-primary",
            onClick: () => { setTosAccepted(true); setShowTos(false); },
            style: { marginTop: '16px', width: '100%' }
          }, "✅ Accetto i Termini")
        )
      )
    ),
    React.createElement("div", { style: { textAlign: 'center', marginTop: '16px', fontSize: '12px' } },
      React.createElement("button", { type: "button", className: "btn-secondary",
        onClick: () => onSwitch("login"),
        style: { background: 'none', border: 'none', color: '#a78bfa', cursor: 'pointer' }
      }, "Hai già un account? Accedi")
    )
  );
}

// ── App root ─────────────────────────────────────────────────────────────
function PasskeyPreview() {
  const pk = 'CTP-' + Array.from({length:4},()=>'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'[Math.floor(Math.random()*32)]).join('') +
             '-' + Array.from({length:4},()=>'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'[Math.floor(Math.random()*32)]).join('');
  const [copied, setCopied] = useState(false);
  const copy = () => { navigator.clipboard.writeText(pk).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);}); };
  return React.createElement("div", null,
    React.createElement("div",{style:{textAlign:'center',marginBottom:'20px'}},
      React.createElement("div",{style:{fontSize:'52px',marginBottom:'8px'}},"🎉"),
      React.createElement("h2",{style:{fontSize:'22px',fontWeight:800,
        background:'linear-gradient(135deg,#22c55e,#06b6d4)',WebkitBackgroundClip:'text',
        WebkitTextFillColor:'transparent'}},"Registrazione completata!"),
      React.createElement("p",{style:{color:'#9ca3af',fontSize:'13px',marginTop:'6px'}},"Ecco la tua Passkey personale di accesso")
    ),
    React.createElement("div",{className:"passkey-box"},
      React.createElement("div",{style:{fontSize:'12px',color:'#9ca3af',marginBottom:'4px'}},"🔑 LA TUA PASSKEY PERSONALE"),
      React.createElement("div",{className:"passkey-code",onClick:copy,title:"Clicca per copiare"},pk),
      React.createElement("div",{className:"copy-hint"},
        copied ? React.createElement("span",{style:{color:'#22c55e'}},"✅ Copiata!") : "👆 Clicca per copiare"
      )
    ),
    React.createElement("div",{className:"success-box"},"📧 Passkey inviata a demo@example.it — controlla la tua casella (anche spam)."),
    React.createElement("div",{className:"warning-box"},
      "⚠️ IMPORTANTE: Salva questa passkey in un posto sicuro. "+
      "Viene richiesta ogni volta che apri la dashboard su un nuovo browser o dispositivo."
    ),
    React.createElement("button",{className:"btn btn-primary",style:{marginTop:'8px'},
      onClick:()=>{window.location.href=DASHBOARD_URL;}},
      "🚀 Entra nella Dashboard"
    ),
    React.createElement("div",{style:{textAlign:'center',marginTop:'12px',fontSize:'11px',color:'#4b5563'}},
      "⚡ Anteprima — in produzione la passkey sarà unica per ogni utente"
    )
  );
}

function App() {
  const params = new URLSearchParams(window.location.search);
  const _initPage = params.get('mode') || 'register';
  const isPreview = params.get('preview') === '1';
  const [page, setPage] = useState(_initPage);
  if (isPreview) return React.createElement("div", { className: "container" }, React.createElement(PasskeyPreview, null));
  return React.createElement("div", { className: "container" },
    page === "register" && React.createElement(RegisterForm, { onSwitch: setPage }),
    page === "login"    && React.createElement(LoginForm, { onSwitch: setPage,
      onSuccess: () => window.location.href = DASHBOARD_URL })
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App, null));
</script>
</body>
</html>
