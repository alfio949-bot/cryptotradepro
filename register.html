<script>
'use strict';

// ── Storage helpers ──────────────────────────────────────────
const store = {
  get:(k,d=null)=>{ try{return JSON.parse(localStorage.getItem(k)||'null')??d;}catch{return d;} },
  set:(k,v)=>localStorage.setItem(k,JSON.stringify(v))
};

// ── Auth ─────────────────────────────────────────────────────
async function sha256(msg){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function callAuth(action,params={}){
  const USERS_KEY='ct_users';
  const users=store.get(USERS_KEY,[]);
  if(action==='register'){
    const{email,password,full_name}=params;
    if(!email||!password)return{success:false,error:'Dati mancanti.'};
    const emailNorm=(email||'').toLowerCase().trim();
    if(users.find(u=>u.email===emailNorm))return{success:false,error:'Email già registrata.'};
    if(password.length<8)return{success:false,error:'Password minimo 8 caratteri.'};
    const passwordHash=await sha256(password+emailNorm);
    const newUser={id:'u_'+Date.now()+'_'+Math.random().toString(36).slice(2,7),email:emailNorm,full_name:full_name||'',passwordHash,createdAt:new Date().toISOString(),premium:false,kyc:'none'};
    users.push(newUser);
    store.set(USERS_KEY,users);
    return{success:true,user:newUser};
  }
  if(action==='login'){
    const{email,password}=params;
    const emailNorm=(email||'').toLowerCase().trim();
    const user=users.find(u=>u.email===emailNorm);
    if(!user)return{success:false,error:'Credenziali non valide.'};
    const hash=await sha256(password+emailNorm);
    if(hash!==user.passwordHash)return{success:false,error:'Credenziali non valide.'};
    const token=await sha256('tok_'+user.id+'_'+Date.now());
    const session={token,userId:user.id,expires:Date.now()+86400000*7,user:{id:user.id,email:user.email,full_name:user.full_name}};
    store.set('ct_session',session);
    return{success:true,...session};
  }
  return{success:false,error:'Azione non riconosciuta.'};
}

// ── Password Strength ─────────────────────────────────────────
function pwdStrength(p){
  let s=0;
  if(p.length>=8)s++;if(p.length>=12)s++;
  if(/[A-Z]/.test(p))s++;if(/[0-9]/.test(p))s++;if(/[^A-Za-z0-9]/.test(p))s++;
  return s; // 0-5
}
function renderStrength(p){
  const s=pwdStrength(p);
  const bar=document.getElementById('pwd-strength');
  if(!bar)return;
  const colors=['#ef4444','#f97316','#f59e0b','#10b981','#06b6d4','#6366f1'];
  const labels=['','Debole','Discreta','Buona','Forte','Eccellente'];
  bar.style.width=(s/5*100)+'%';bar.style.background=colors[s];
  const lbl=document.getElementById('pwd-strength-lbl');
  if(lbl)lbl.textContent=labels[s]||'';
}

async function doLogin(e){
  e.preventDefault();
  const btn=document.getElementById('login-btn');
  btn.disabled=true;btn.textContent='⏳ Autenticazione in corso...';
  const email=document.getElementById('l-email').value;
  const pwd=document.getElementById('l-pwd').value;
  try{
    const res=await callAuth('login',{email,password:pwd});
    if(res.success){
      store.set('crypto_session',{token:res.token,userId:res.userId,user:res.user});
      localStorage.setItem('user_logged_in','1');
      localStorage.setItem('user_name',res.user.full_name||res.user.email);
      window.location.href='crypto_dashboard_v3_fixed.html';
    }else{
      document.getElementById('form-err').innerHTML=`<div class="err">⚠️ ${res.error}</div>`;
      btn.disabled=false;btn.textContent='🔐 Autenticati';
    }
  }catch(err){
    document.getElementById('form-err').innerHTML=`<div class="err">⚠️ Errore di connessione</div>`;
    btn.disabled=false;btn.textContent='🔐 Autenticati';
  }
}

async function doRegister(e){
  e.preventDefault();
  const btn=document.getElementById('register-btn');
  const name=document.getElementById('r-name').value;
  const email=document.getElementById('r-email').value;
  const pwd=document.getElementById('r-pwd').value;
  const pwd2=document.getElementById('r-pwd2').value;
  if(pwd!==pwd2){
    document.getElementById('form-err').innerHTML=`<div class="err">⚠️ Le passphrase non coincidono.</div>`;return;
  }
  if(pwdStrength(pwd)<2){
    document.getElementById('form-err').innerHTML=`<div class="err">⚠️ Passphrase troppo debole. Usa almeno 8 caratteri con lettere e numeri.</div>`;return;
  }
  btn.disabled=true;btn.textContent='⏳ Creazione account...';
  try{
    const res=await callAuth('register',{email,password:pwd,full_name:name});
    if(res.success){
      const loginRes=await callAuth('login',{email,password:pwd});
      if(loginRes.success){
        store.set('crypto_session',{token:loginRes.token,userId:loginRes.userId,user:loginRes.user});
        localStorage.setItem('user_logged_in','1');
        localStorage.setItem('user_name',name||email);
        window.location.href='crypto_dashboard_v3_fixed.html';return;
      }
      document.getElementById('form-err').innerHTML=`<div class="ok">✅ Account creato. Accedi ora.</div>`;
      setTimeout(renderLogin,1500);
    }else{
      document.getElementById('form-err').innerHTML=`<div class="err">⚠️ ${res.error}</div>`;
      btn.disabled=false;btn.textContent='🚀 Crea Account Istituzionale';
    }
  }catch(err){
    document.getElementById('form-err').innerHTML=`<div class="err">⚠️ Errore di connessione</div>`;
    btn.disabled=false;btn.textContent='🚀 Crea Account Istituzionale';
  }
}

        <h3>Architettura Non-Custodial</h3>
        <p>Le chiavi private degli utenti NON transitano mai attraverso i server della piattaforma. Connessione wallet tramite WalletConnect 2.0 (protocollo E2E cifrato). Firma transazioni esclusivamente lato client (browser/hardware wallet).</p>
        <h3>Multi-Sig Admin (Enterprise)</h3>
        <p>Tutte le operazioni critiche dell'Admin Panel richiedono Consenso Multi-Signature 2-of-3. Compatibile con Ledger/Trezor via WalletConnect. Nessuna operazione critica eseguibile da singolo amministratore.</p>
        <h3>RBAC (Role-Based Access Control)</h3>
        <p>Ruoli: System Admin · Compliance Officer · Risk Manager · Support Agent. Accessi isolati per ruolo — nessun cross-permission non autorizzato. Principio del minimo privilegio applicato a ogni livello.</p>
        <h3>Audit Trail Immutabile</h3>
        <p>Ogni azione admin genera un hash SHA-256 concatenato al blocco precedente (struttura blockchain-like). Log immutabili — nessuna modifica retroattiva possibile. Exportabili per revisioni dei regolatori (MiCA/CONSOB compliance).</p>
        <h3>Zero-Knowledge Backoffice</h3>
        <p>L'admin può monitorare metriche di compliance e volumi di trading senza accedere a: chiavi private utenti, testo in chiaro delle password, contenuto cifrato dei wallet. Architettura certificata Privacy-Preserving.</p>
